name: Update Stock Prices

on:
  schedule:
    # Run every 30 min during KRX market hours (09:00-15:30 KST = 00:00-06:30 UTC)
    - cron: '*/30 0-6 * * 1-5'
    # Also run at 06:35 UTC (15:35 KST) for closing prices
    - cron: '35 6 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
